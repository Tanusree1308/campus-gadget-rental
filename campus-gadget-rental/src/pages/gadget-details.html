<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gadget Details — CampusRent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../styles/custom.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .leaflet-tile {
      filter: brightness(0.75) saturate(0.6) hue-rotate(190deg);
    }

    .leaflet-container {
      background: #0f172a;
    }

    .leaflet-popup-content-wrapper {
      background: #1e293b !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      border-radius: 12px !important;
    }

    .leaflet-popup-content {
      color: #e2e8f0;
      font-size: 12px;
      margin: 8px 12px !important;
    }

    .leaflet-popup-tip {
      background: #1e293b !important;
    }
  </style>
</head>

<body class="bg-slate-950 text-white antialiased">
  <div id="navbar"></div>
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <a href="marketplace.html"
      class="inline-flex items-center gap-1.5 text-sm text-slate-400 hover:text-blue-400 transition mb-8">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Back to Marketplace
    </a>
    <div id="gadget-content" class="grid grid-cols-1 lg:grid-cols-2 gap-10"></div>
    <div class="mt-16">
      <h2 class="text-xl font-bold text-white mb-6">Similar Gadgets</h2>
      <div id="related-gadgets" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>
    </div>
  </div>
  <div id="footer"></div>

  <script type="module">
    import { renderNavbar } from '../components/navbar.js';
    import { renderFooter } from '../components/footer.js';
    import { createGadgetCard } from '../components/gadget-card.js';
    import { sampleGadgets, inr } from '../data/sample-gadgets.js';
    import { renderChat } from '../components/chat.js';

    renderNavbar('marketplace');
    renderFooter();
    window.__cgr__ = { sampleGadgets };
    renderChat();

    const params = new URLSearchParams(window.location.search);
    const gadget = sampleGadgets.find(g => g.id === params.get('id')) || sampleGadgets[0];

    const stars = Array.from({ length: 5 }, (_, i) =>
      `<svg class="w-5 h-5 ${i < Math.floor(gadget.rating) ? 'text-yellow-400' : 'text-slate-700'}" fill="currentColor" viewBox="0 0 20 20">
        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
      </svg>`
    ).join('');

    document.getElementById('gadget-content').innerHTML = `
      <div>
        <div class="rounded-2xl overflow-hidden h-80 bg-slate-800 border border-white/5 mb-3">
          <img src="${gadget.images[0]}" alt="${gadget.name}" class="w-full h-full object-cover"/>
        </div>
        <div class="flex gap-2">
          <div class="w-16 h-16 rounded-xl overflow-hidden border-2 border-blue-500 cursor-pointer">
            <img src="${gadget.images[0]}" class="w-full h-full object-cover"/>
          </div>
        </div>
      </div>
      <div>
        <div class="flex items-start justify-between mb-3">
          <span class="text-xs font-medium text-purple-300 bg-purple-500/10 border border-purple-500/20 px-2.5 py-1 rounded-full">${gadget.category}</span>
          <span class="text-xs font-medium px-2.5 py-1 rounded-full ${gadget.available ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">
            ${gadget.available ? '● Available' : '● Rented'}
          </span>
        </div>
        <h1 class="text-3xl font-bold text-white mt-2 mb-3">${gadget.name}</h1>
        <div class="flex items-center gap-2 mb-5">
          <div class="flex">${stars}</div>
          <span class="text-sm text-slate-300">${gadget.rating}</span>
          <span class="text-slate-600 text-sm">(${gadget.reviews} reviews)</span>
        </div>
        <p class="text-slate-400 text-sm leading-relaxed mb-7">${gadget.description}</p>
        <div class="grid grid-cols-3 gap-3 mb-7">
          <div class="stat-card text-center">
            <p class="text-blue-400 font-bold text-xl">${inr(gadget.price_per_day)}</p>
            <p class="text-xs text-slate-500 mt-1">per day</p>
          </div>
          <div class="stat-card text-center" style="background:linear-gradient(135deg,rgba(147,51,234,0.1),rgba(147,51,234,0.05));border-color:rgba(147,51,234,0.2)">
            <p class="text-purple-400 font-bold text-xl">${inr(gadget.deposit)}</p>
            <p class="text-xs text-slate-500 mt-1">deposit</p>
          </div>
          <div class="stat-card text-center" style="background:rgba(255,255,255,0.02)">
            <p class="text-white font-bold text-lg">${gadget.condition}</p>
            <p class="text-xs text-slate-500 mt-1">condition</p>
          </div>
        </div>
        <div class="flex items-center gap-3 p-4 glass rounded-xl mb-6">
          <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white font-bold text-sm">
            ${gadget.owner.charAt(0)}
          </div>
          <div>
            <p class="text-sm font-medium text-white">${gadget.owner}</p>
            <p class="text-xs text-slate-500">Verified Student · Andhra Pradesh</p>
          </div>
          <div class="ml-auto text-xs text-emerald-400 font-medium bg-emerald-500/10 px-2 py-1 rounded-full border border-emerald-500/20">✓ Trusted</div>
        </div>
        <a href="booking.html?id=${gadget.id}"
          class="block w-full text-center py-4 rounded-xl font-bold text-sm transition ${gadget.available ? 'btn-primary' : 'bg-slate-800 text-slate-500 cursor-not-allowed pointer-events-none border border-white/5'}">
          ${gadget.available ? 'Book This Gadget →' : 'Currently Unavailable'}
        </a>
        <p class="text-xs text-slate-600 text-center mt-2">Deposit fully refunded upon safe return</p>
        ${gadget.lat ? `
        <div class="mt-5">
          <div class="flex items-center justify-between mb-2">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              Pickup Location
            </p>
            <a href="map.html" class="text-xs text-blue-400 hover:underline">View on full map →</a>
          </div>
          <p class="text-xs text-slate-500 mb-2">📍 ${gadget.location || 'Andhra Pradesh'}</p>
          <div id="detail-map" class="rounded-xl overflow-hidden border border-white/5" style="height:180px"></div>
        </div>` : ''}
      </div>`;

    // Related gadgets
    const related = sampleGadgets.filter(g => g.id !== gadget.id && g.category === gadget.category).slice(0, 4);
    const fallback = sampleGadgets.filter(g => g.id !== gadget.id).slice(0, 4);
    const toShow = related.length >= 2 ? related : fallback;
    document.getElementById('related-gadgets').innerHTML = toShow.map(g => createGadgetCard(g)).join('');

    // Mini map
    if (gadget.lat && document.getElementById('detail-map')) {
      const dMap = L.map('detail-map', {
        zoomControl: false, attributionControl:
          false, dragging: false, scrollWheelZoom: false
      }).setView([gadget.lat, gadget.lng], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(dMap);
      const pinIcon = L.divIcon({
        className: '',
        html: `<div style="width:28px;height:28px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:2px solid rgba(255,255,255,0.4);border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 4px 12px rgba(37,99,235,0.5);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:12px">📍</span></div>`,
        iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -30],
      });
      L.marker([gadget.lat, gadget.lng], { icon: pinIcon })
        .addTo(dMap)
        .bindPopup(`<strong style="color:white">${gadget.name}</strong><br><span style="color:#94a3b8">${gadget.location || ''}</span>`)
        .openPopup();
      dMap.getContainer().style.cursor = 'pointer';
      dMap.getContainer().addEventListener('click', () => window.location.href = 'map.html');
    }
  </script>
</body>

</html>
