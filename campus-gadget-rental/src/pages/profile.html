<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile — CampusRent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/custom.css" />
</head>

<body class="bg-slate-950 text-white antialiased">
    <div id="navbar"></div>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="mb-8">
            <p class="text-blue-400 text-xs font-semibold uppercase tracking-widest mb-2">Account</p>
            <h1 class="text-2xl font-bold text-white">My Profile</h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Avatar & Stats -->
            <div class="md:col-span-1 space-y-4">
                <div class="glass rounded-2xl p-6 text-center">
                    <div id="avatar"
                        class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white text-3xl font-extrabold mx-auto mb-3 shadow-lg shadow-blue-500/20">
                        U</div>
                    <h2 id="profile-name" class="font-bold text-white mb-0.5">User</h2>
                    <p id="profile-email" class="" slate-500 mb-4">user@email.com</p>
                    <div class="flex justify-center items-center gap-1 mb-4">
                        <svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                            <path
                                d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
                        </svg>
                        <span class="text-sm font-semibold text-white">4.8</span>
                        <span class="text-xs text-slate-500">(12 reviews)</span>
                    </div>
                    <span
                        class="inline-block bg-emerald-500/10 text-emerald-400 text-xs font-medium px-3 py-1 rounded-full border border-emerald-500/20">✓
                        Verified Student</span>
                    <div class="grid grid-cols-2 gap-3 mt-5">
                        <div class="bg-slate-800/50 rounded-xl p-3 text-center border border-white/5">
                            <p class="text-xl font-bold text-blue-400">2</p>
                            <p class="text-xs text-slate-500 mt-0.5">Listed</p>
                        </div>
                        <div class="bg-slate-800/50 rounded-xl p-3 text-center border border-white/5">
                            <p class="text-xl font-bold text-purple-400">5</p>
                            <p class="text-xs text-slate-500 mt-0.5">Rented</p>
                        </div>
                    </div>
                </div>

                <!-- Earnings card -->
                <div class="stat-card">
                    <p class="text-xs text-slate-500 uppercase tracking-wide mb-2">Total Earnings</p>
                    <p class="text-2xl font-extrabold text-yellow-400">$142</p>
                    <p class="text-xs text-slate-600 mt-1">From 3 completed rentals</p>
                </div>
            </div>

            <!-- Edit Form -->
            <div class="md:col-span-2 space-y-4">
                <div class="glass rounded-2xl p-6">
                    <h2 class="font-semibold text-white mb-5">Edit Profile</h2>
                    <form id="profile-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label
                                    class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">Full
                                    Name</label>
                                <input type="text" id="edit-name" placeholder="Your Name" class="input-dark" />
                            </div>
                            <div>
                                <label
                                    class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">University</label>
                                <input type="text" id="edit-university" placeholder="e.g. MIT" class="input-dark" />
                            </div>
                        </div>
                        <div>
                            <label
                                class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">Email</label>
                            <input type="email" id="edit-email" disabled
                                class="input-dark opacity-40 cursor-not-allowed" />
                        </div>
                        <div>
                            <label
                                class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">Bio</label>
                            <textarea id="edit-bio" rows="3" placeholder="Tell renters a bit about yourself..."
                                class="input-dark resize-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">Phone
                                (optional)</label>
                            <input type="tel" id="edit-phone" placeholder="+1 (555) 000-0000" class="input-dark" />
                        </div>
                        <div id="profile-success"
                            class="hidden text-emerald-400 text-xs bg-emerald-500/10 border border-emerald-500/20 rounded-lg px-3 py-2">
                            Profile updated successfully.</div>
                        <button type="submit" class="btn-primary w-full text-center">Save Changes</button>
                    </form>
                </div>

                <!-- Danger Zone -->
                <div class="rounded-2xl p-5 border border-red-500/10 bg-red-500/5">
                    <h2 class="font-semibold text-red-400 text-sm mb-3">Account Actions</h2>
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-white">Sign out</p>
                            <p class="text-xs text-slate-500">You'll need to log in again to access your account.</p>
                        </div>
                        <button id="logout-profile"
                            class="text-sm text-red-400 border border-red-500/20 px-4 py-2 rounded-xl hover:bg-red-500/10 transition">
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script type="module">
        import { renderNavbar } from '../components/navbar.js';
        import { renderFooter } from '../components/footer.js';

        renderNavbar('profile');
        renderFooter();

        const user = JSON.parse(localStorage.getItem('cgr_user') || 'null');
        if (!user) { window.location.href = 'auth.html'; }

        document.getElementById('profile-name').textContent = user?.name || 'User';
        document.getElementById('profile-email').textContent = user?.email || '';
        document.getElementById('edit-name').value = user?.name || '';
        document.getElementById('edit-email').value = user?.email || '';
        document.getElementById('avatar').textContent = (user?.name || 'U').charAt(0).toUpperCase();

        const profile = JSON.parse(localStorage.getItem('cgr_profile') || '{}');
        document.getElementById('edit-university').value = profile.university || '';
        document.getElementById('edit-bio').value = profile.bio || '';
        document.getElementById('edit-phone').value = profile.phone || '';

        document.getElementById('profile-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const updated = { ...user, name: document.getElementById('edit-name').value };
            localStorage.setItem('cgr_user', JSON.stringify(updated));
            localStorage.setItem('cgr_profile', JSON.stringify({
                university: document.getElementById('edit-university').value,
                bio: document.getElementById('edit-bio').value,
                phone: document.getElementById('edit-phone').value,
            }));
            // Firebase: replace with → await updateUserProfile(user.id, {...}) from firebase.js
            const suc = document.getElementById('profile-success');
            suc.classList.remove('hidden');
            setTimeout(() => suc.classList.add('hidden'), 3000);
        });

        document.getElementById('logout-profile').addEventListener('click', () => {
            localStorage.removeItem('cgr_user');
            window.location.href = '../../index.html';
        });
    </script>
</body>

</html>
